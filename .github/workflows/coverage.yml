# =============================================================================
# coverage.yml — Test coverage + Codecov upload
# =============================================================================
# Runs on every push to main and on PRs. Generates coverage profiles
# for Go (backend) and TypeScript (frontend), uploads to Codecov.
#
# Codecov automatically merges multiple uploads into a single report.
#
# Secrets required:
#   CODECOV_TOKEN — from https://app.codecov.io/gh/scramble22/gomo6.2/settings
# =============================================================================

name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ##############################################################################
  # Go backend coverage
  ##############################################################################
  go:
    name: Go coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend-go
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache-dependency-path: apps/backend-go/go.sum

      - name: Run tests with coverage
        run: |
          mkdir -p ../../coverage/go
          go test -coverprofile=../../coverage/go/coverage.out -covermode=atomic ./...

      - name: Upload Go coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/go/coverage.out
          flags: backend
          name: go-coverage
          fail_ci_if_error: false
          verbose: true

  ##############################################################################
  # Frontend coverage (Vitest)
  ##############################################################################
  frontend:
    name: Frontend coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests with coverage
        run: npm run test:coverage --workspace=@gomo6/web

      - name: Upload frontend coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/frontend/lcov.info
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false
          verbose: true
