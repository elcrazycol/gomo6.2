name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ##############################################################################
  # Backend (Go)
  ##############################################################################
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend-go

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: gomo6
          POSTGRES_DB: gomo6
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: apps/backend-go/go.sum

      - name: Build
        run: go build -o /dev/null ./cmd/server/

      - name: Vet
        run: go vet ./...

      - name: Vendoring check
        run: go mod tidy && git diff --exit-code go.mod go.sum

      - name: Run migrations & test
        env:
          DATABASE_URL: postgres://gomo6@localhost:5432/gomo6?sslmode=disable
          REDIS_URL: redis://localhost:6379/0
        run: |
          for f in migrations/0*.sql; do
            psql "$DATABASE_URL" -q < "$f"
          done
          go test -count=1 ./...

  ##############################################################################
  # Frontend (TypeScript apps)
  ##############################################################################
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript — web
        run: npx tsc --noEmit -p apps/web/tsconfig.app.json

      - name: TypeScript — dev-dashboard
        run: npx tsc --noEmit -p apps/dev-dashboard/tsconfig.json

      - name: TypeScript — docs
        run: npx tsc --noEmit -p apps/docs/tsconfig.json

      - name: Lint — web
        run: npm run lint --workspace=@gomo6/web

      - name: Build — web
        run: npm run build --workspace=@gomo6/web

      - name: Build — dev-dashboard
        run: npm run build --workspace=@gomo6/dev-dashboard

      - name: Build — docs
        run: npm run build --workspace=@gomo6/docs
