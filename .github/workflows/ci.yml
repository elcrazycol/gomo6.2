# ──────────────────────────────────────────────────────────────────────────────
# ci.yml — Быстрый CI на каждый push/PR
# Только критичные проверки: сборка, линтинг, типчекинг, секьюрити.
# Полные тесты с БД → full-tests.yml
# ──────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ##############################################################################
  # Backend (Go) — build + lint + vet + vulnerable check
  ##############################################################################
  backend:
    name: Go (build + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend-go

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: apps/backend-go/go.sum

      - name: Build
        run: go build -o /dev/null ./cmd/server/

      - name: Vet
        run: go vet ./...

      - name: Lint (golangci-lint)
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          args: --timeout=5m ./...
          working-directory: apps/backend-go

      - name: Vulnerability check (govulncheck)
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: apps/backend-go/go.mod
          work-dir: apps/backend-go

      - name: Vendoring check
        run: go mod tidy && git diff --exit-code go.mod go.sum

  ##############################################################################
  # Secret scanning (gitleaks)
  ##############################################################################
  gitleaks:
    name: Secrets scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ##############################################################################
  # Dockerfile linting (hadolint)
  ##############################################################################
  dockerfile:
    name: Dockerfile lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true

  ##############################################################################
  # Frontend (TypeScript) — install, typecheck, lint, build
  ##############################################################################
  frontend:
    name: Frontend (TS + lint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript — web
        run: npx tsc --noEmit -p apps/web/tsconfig.app.json

      - name: TypeScript — dev-dashboard
        run: npx tsc --noEmit -p apps/dev-dashboard/tsconfig.json

      - name: TypeScript — docs
        run: npx tsc --noEmit -p apps/docs/tsconfig.json

      - name: Lint — web
        run: npm run lint --workspace=@gomo6/web

      - name: Build — web
        run: npm run build --workspace=@gomo6/web

      - name: Build — dev-dashboard
        run: npm run build --workspace=@gomo6/dev-dashboard

      - name: Build — docs
        run: npm run build --workspace=@gomo6/docs
