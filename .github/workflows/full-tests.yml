# ──────────────────────────────────────────────────────────────────────────────
# full-tests.yml — Полный набор тестов (с БД, race detector, e2e)
# Запуск: вручную (workflow_dispatch) или по расписанию (cron).
# Быстрая проверка на каждый коммит → ci.yml
# ──────────────────────────────────────────────────────────────────────────────

name: Full Tests

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch / tag / commit SHA'
        required: false
        default: main
  schedule:
    # Каждый день в 06:00 UTC
    - cron: '0 6 * * *'

jobs:
  ##############################################################################
  # Backend (Go) — полный набор с race-детектором и БД
  ##############################################################################
  backend:
    name: Go (full tests + race)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend-go

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: gomo6
          POSTGRES_DB: gomo6
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || 'main' }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: apps/backend-go/go.sum

      - name: Build
        run: go build -o /dev/null ./cmd/server/

      - name: Vet
        run: go vet ./...

      - name: Lint (golangci-lint)
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          args: --timeout=5m ./...
          working-directory: apps/backend-go

      - name: Vulnerability check (govulncheck)
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: apps/backend-go/go.mod
          work-dir: apps/backend-go

      - name: Vendoring check
        run: go mod tidy && git diff --exit-code go.mod go.sum

      - name: Apply migrations to test DB
        env:
          PGHOST: localhost
          PGUSER: gomo6
          PGDATABASE: gomo6
        run: |
          for f in migrations/0*.sql; do
            psql -q < "$f"
          done
        shell: bash

      - name: Test with race detector
        env:
          DATABASE_URL_TEST: postgres://gomo6@localhost:5432/gomo6?sslmode=disable
          REDIS_URL: redis://localhost:6379/0
        run: go test -race -count=1 -v ./...

      - name: Coverage report
        env:
          DATABASE_URL_TEST: postgres://gomo6@localhost:5432/gomo6?sslmode=disable
          REDIS_URL: redis://localhost:6379/0
        run: |
          go test -coverprofile=coverage.out -count=1 ./...
          go tool cover -func=coverage.out

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: apps/backend-go/coverage.out
          retention-days: 7

  ##############################################################################
  # Frontend (TypeScript) — тесты и аудит зависимостей
  ##############################################################################
  frontend:
    name: Frontend (tests + audit + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || 'main' }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript — web
        run: npx tsc --noEmit -p apps/web/tsconfig.app.json

      - name: TypeScript — dev-dashboard
        run: npx tsc --noEmit -p apps/dev-dashboard/tsconfig.json

      - name: TypeScript — docs
        run: npx tsc --noEmit -p apps/docs/tsconfig.json

      - name: Lint — web
        run: npm run lint --workspace=@gomo6/web

      - name: Test — web
        run: npm run test --workspace=@gomo6/web

      - name: Audit dependencies
        run: npm audit --audit-level=critical

      - name: Build — web
        run: npm run build --workspace=@gomo6/web

      - name: Build — dev-dashboard
        run: npm run build --workspace=@gomo6/dev-dashboard

      - name: Build — docs
        run: npm run build --workspace=@gomo6/docs

  ##############################################################################
  # E2E Smoke test — docker-compose + register + photo upload + CORS
  ##############################################################################
  smoke:
    name: E2E Smoke (register + upload + CORS + post + like)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || 'main' }}

      - name: Start all services
        run: |
          set -euo pipefail
          # Clean up from any previous (failed) run
          docker compose down -v 2>/dev/null || true
          docker compose up -d --wait
          # Give backend extra time for migrations + bucket bootstrap
          sleep 15

      - name: Health check
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            if curl -sf http://localhost/health; then
              echo "Health OK"
              break
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done
          curl -f http://localhost/health || exit 1

      - name: Register test user
        run: |
          set -euo pipefail
          # May fail if user already exists from a previous run — that's OK
          curl -s -X POST http://localhost/api/v1/auth/register \
            -H 'Content-Type: application/json' \
            -d '{"email":"e2eci@test.com","username":"e2eci","password":"test123456"}' \
            || echo "User may already exist, continuing..."

      - name: Login and get token
        id: login
        run: |
          set -euo pipefail
          TOKEN=$(curl -sf -X POST http://localhost/api/v1/auth/login \
            -H 'Content-Type: application/json' \
            -d '{"email":"e2eci@test.com","password":"test123456"}' \
            | python3 -c 'import sys,json; print(json.load(sys.stdin)["data"]["token"])')
          echo "TOKEN=${TOKEN}" >> $GITHUB_OUTPUT
          echo "Token obtained: ${TOKEN:0:20}..."

      - name: Create test JPEG
        run: |
          set -euo pipefail
          python3 -c "
          import base64
          jpeg = base64.b64decode('')
          with open('/tmp/test.jpg', 'wb') as f:
              f.write(jpeg)
          print('Created', len(jpeg), 'bytes')
          "

      - name: Presigned PUT URL — content bucket
        id: presign_content
        env:
          TOKEN: ${{ steps.login.outputs.TOKEN }}
        run: |
          set -euo pipefail
          RESP=$(curl -sf -X POST http://localhost/storage/v1/presign-upload \
            -H "Authorization: Bearer $TOKEN" \
            -H 'Content-Type: application/json' \
            -d '{"bucket":"content","key":"e2eci/test-photo.jpg","content_type":"image/jpeg"}')
          UPLOAD_URL=$(echo "$RESP" | python3 -c 'import sys,json; print(json.load(sys.stdin)["data"]["upload_url"])')
          echo "UPLOAD_URL=${UPLOAD_URL}" >> $GITHUB_OUTPUT
          echo "Content presigned URL host: $(echo $UPLOAD_URL | python3 -c 'import sys; from urllib.parse import urlparse; print(urlparse(sys.stdin.read().strip()).netloc)')"

      - name: Upload photo to content bucket
        env:
          UPLOAD_URL: ${{ steps.presign_content.outputs.UPLOAD_URL }}
        run: |
          set -euo pipefail
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' -X PUT \
            -H 'Content-Type: image/jpeg' --data-binary @/tmp/test.jpg "$UPLOAD_URL")
          echo "Content upload HTTP: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Expected 200, got $HTTP_CODE"
            exit 1
          fi

      - name: Presigned PUT URL — post-images bucket (avatar)
        id: presign_avatar
        env:
          TOKEN: ${{ steps.login.outputs.TOKEN }}
        run: |
          set -euo pipefail
          RESP=$(curl -sf -X POST http://localhost/storage/v1/presign-upload \
            -H "Authorization: Bearer $TOKEN" \
            -H 'Content-Type: application/json' \
            -d '{"bucket":"post-images","key":"e2eci/avatar.jpg","content_type":"image/jpeg"}')
          UPLOAD_URL=$(echo "$RESP" | python3 -c 'import sys,json; print(json.load(sys.stdin)["data"]["upload_url"])')
          echo "UPLOAD_URL=${UPLOAD_URL}" >> $GITHUB_OUTPUT

      - name: Upload avatar to post-images bucket
        env:
          UPLOAD_URL: ${{ steps.presign_avatar.outputs.UPLOAD_URL }}
        run: |
          set -euo pipefail
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' -X PUT \
            -H 'Content-Type: image/jpeg' --data-binary @/tmp/test.jpg "$UPLOAD_URL")
          echo "Avatar upload HTTP: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Expected 200, got $HTTP_CODE"
            exit 1
          fi

      - name: CORS preflight — content bucket
        run: |
          set -euo pipefail
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' -X OPTIONS \
            -H 'Origin: http://localhost' \
            -H 'Access-Control-Request-Method: PUT' \
            'http://localhost:3900/content/')
          echo "CORS content HTTP: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "CORS preflight failed for content bucket"
            exit 1
          fi

      - name: CORS preflight — post-images bucket
        run: |
          set -euo pipefail
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' -X OPTIONS \
            -H 'Origin: http://localhost' \
            -H 'Access-Control-Request-Method: PUT' \
            'http://localhost:3900/post-images/')
          echo "CORS post-images HTTP: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "CORS preflight failed for post-images bucket"
            exit 1
          fi

      - name: Verify presigned URL targets localhost:3900
        env:
          CONTENT_URL: ${{ steps.presign_content.outputs.UPLOAD_URL }}
        run: |
          set -euo pipefail
          HOST=$(echo "$CONTENT_URL" | python3 -c 'import sys; from urllib.parse import urlparse; print(urlparse(sys.stdin.read().strip()).netloc)')
          if [ "$HOST" != "localhost:3900" ]; then
            echo "Expected presigned URL host localhost:3900, got $HOST"
            exit 1
          fi
          echo "Presigned URL host correct: $HOST"

      - name: Create test board
        id: create_board
        env:
          TOKEN: ${{ steps.login.outputs.TOKEN }}
        run: |
          set -euo pipefail
          RESP=$(curl -sf -X POST http://localhost/rest/v1/boards \
            -H "Authorization: Bearer $TOKEN" \
            -H 'Content-Type: application/json' \
            -d '{"slug":"e2e-smoke-board","name":"E2E Smoke Board","description":"Test board for smoke tests"}')
          BOARD_ID=$(echo "$RESP" | python3 -c 'import sys,json; print(json.load(sys.stdin)["data"]["id"])')
          echo "BOARD_ID=${BOARD_ID}" >> $GITHUB_OUTPUT
          echo "Board created: ${BOARD_ID:0:8}..."

      - name: Create test thread
        id: create_thread
        env:
          TOKEN: ${{ steps.login.outputs.TOKEN }}
          BOARD_ID: ${{ steps.create_board.outputs.BOARD_ID }}
        run: |
          set -euo pipefail
          RESP=$(curl -sf -X POST http://localhost/rest/v1/threads \
            -H "Authorization: Bearer $TOKEN" \
            -H 'Content-Type: application/json' \
            -d "{\"board_id\":\"$BOARD_ID\",\"title\":\"E2E Smoke Thread\",\"content\":\"Thread for smoke test post\"}")
          THREAD_ID=$(echo "$RESP" | python3 -c 'import sys,json; print(json.load(sys.stdin)["data"]["id"])')
          echo "THREAD_ID=${THREAD_ID}" >> $GITHUB_OUTPUT
          echo "Thread created: ${THREAD_ID:0:8}..."

      - name: Create post with attachment
        id: create_post
        env:
          TOKEN: ${{ steps.login.outputs.TOKEN }}
          THREAD_ID: ${{ steps.create_thread.outputs.THREAD_ID }}
        run: |
          set -euo pipefail
          RESP=$(curl -sf -X POST http://localhost/rest/v1/posts \
            -H "Authorization: Bearer $TOKEN" \
            -H 'Content-Type: application/json' \
            -d "{\"thread_id\":\"$THREAD_ID\",\"content\":\"Smoke test post with photo\",\"attachments\":[{\"url\":\"e2eci/test-photo.jpg\",\"type\":\"image\",\"mime\":\"image/jpeg\",\"name\":\"test-photo.jpg\",\"size\":631}]}")
          POST_ID=$(echo "$RESP" | python3 -c 'import sys,json; print(json.load(sys.stdin)["data"]["id"])')
          POST_CONTENT=$(echo "$RESP" | python3 -c 'import sys,json; print(json.load(sys.stdin)["data"]["content"])')
          ATTACHMENT_COUNT=$(echo "$RESP" | python3 -c 'import sys,json; print(len(json.load(sys.stdin)["data"]["attachments"]))')
          if [ "$POST_CONTENT" != "Smoke test post with photo" ]; then
            echo "Post content mismatch: expected 'Smoke test post with photo', got '$POST_CONTENT'"
            exit 1
          fi
          if [ "$ATTACHMENT_COUNT" != "1" ]; then
            echo "Expected 1 attachment, got $ATTACHMENT_COUNT"
            exit 1
          fi
          echo "Post created with attachment: ${POST_ID:0:8}..."
          echo "POST_ID=${POST_ID}" >> $GITHUB_OUTPUT

      - name: Like the post
        id: like_post
        env:
          TOKEN: ${{ steps.login.outputs.TOKEN }}
          POST_ID: ${{ steps.create_post.outputs.POST_ID }}
        run: |
          set -euo pipefail
          curl -sf -X POST "http://localhost/api/v1/posts/$POST_ID/like" \
            -H "Authorization: Bearer $TOKEN" \
            -H 'Content-Type: application/json' > /dev/null
          echo "Post liked: $POST_ID"

      - name: Verify like count
        env:
          POST_ID: ${{ steps.create_post.outputs.POST_ID }}
        run: |
          set -euo pipefail
          LIKES_COUNT=$(curl -sf "http://localhost/api/rpc/get_post_likes_count?post_uuid=$POST_ID" \
            | python3 -c 'import sys,json; print(json.load(sys.stdin)["data"])')
          if [ "$LIKES_COUNT" != "1" ]; then
            echo "Expected likes=1, got $LIKES_COUNT"
            exit 1
          fi
          echo "Like count verified: $LIKES_COUNT"

      - name: Dump logs on failure
        if: failure()
        run: |
          set -euo pipefail
          echo "=== Backend logs ===" && docker compose logs --tail=100 backend
          echo "=== Garage logs ===" && docker compose logs --tail=30 garage
          echo "=== Garage-init logs ===" && docker compose logs --tail=30 garage-init
          echo "=== Caddy logs ===" && docker compose logs --tail=30 caddy

      - name: Stop services
        if: always()
        run: docker compose down -v
