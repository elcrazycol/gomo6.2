# ──────────────────────────────────────────────────────────────────────────────
# full-tests.yml — Полный набор тестов (с БД, race detector, e2e)
# Запуск: вручную (workflow_dispatch) или по расписанию (cron).
# Быстрая проверка на каждый коммит → ci.yml
# ──────────────────────────────────────────────────────────────────────────────

name: Full Tests

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch / tag / commit SHA'
        required: false
        default: main
  schedule:
    # Каждый день в 06:00 UTC
    - cron: '0 6 * * *'

jobs:
  ##############################################################################
  # Backend (Go) — полный набор с race-детектором и БД
  ##############################################################################
  backend:
    name: Go (full tests + race)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend-go

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: gomo6
          POSTGRES_DB: gomo6
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || 'main' }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: apps/backend-go/go.sum

      - name: Build
        run: go build -o /dev/null ./cmd/server/

      - name: Vet
        run: go vet ./...

      - name: Lint (golangci-lint)
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          args: --timeout=5m ./...
          working-directory: apps/backend-go

      - name: Vulnerability check (govulncheck)
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: apps/backend-go/go.mod
          work-dir: apps/backend-go

      - name: Vendoring check
        run: go mod tidy && git diff --exit-code go.mod go.sum

      - name: Apply migrations to test DB
        env:
          PGHOST: localhost
          PGUSER: gomo6
          PGDATABASE: gomo6
        run: |
          for f in migrations/0*.sql; do
            psql -q < "$f"
          done
        shell: bash

      - name: Test with race detector
        env:
          DATABASE_URL_TEST: postgres://gomo6@localhost:5432/gomo6?sslmode=disable
          REDIS_URL: redis://localhost:6379/0
        run: go test -race -count=1 -v ./...

      - name: Coverage report
        env:
          DATABASE_URL_TEST: postgres://gomo6@localhost:5432/gomo6?sslmode=disable
          REDIS_URL: redis://localhost:6379/0
        run: |
          go test -coverprofile=coverage.out -count=1 ./...
          go tool cover -func=coverage.out

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: apps/backend-go/coverage.out
          retention-days: 7

  ##############################################################################
  # Frontend (TypeScript) — тесты и аудит зависимостей
  ##############################################################################
  frontend:
    name: Frontend (tests + audit + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || 'main' }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript — web
        run: npx tsc --noEmit -p apps/web/tsconfig.app.json

      - name: TypeScript — dev-dashboard
        run: npx tsc --noEmit -p apps/dev-dashboard/tsconfig.json

      - name: TypeScript — docs
        run: npx tsc --noEmit -p apps/docs/tsconfig.json

      - name: Lint — web
        run: npm run lint --workspace=@gomo6/web

      - name: Test — web
        run: npm run test --workspace=@gomo6/web

      - name: Audit dependencies
        run: npm audit --audit-level=critical

      - name: Build — web
        run: npm run build --workspace=@gomo6/web

      - name: Build — dev-dashboard
        run: npm run build --workspace=@gomo6/dev-dashboard

      - name: Build — docs
        run: npm run build --workspace=@gomo6/docs

  ##############################################################################
  # Smoke test (docker-compose)
  ##############################################################################
  smoke:
    name: Smoke test (docker-compose)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || 'main' }}

      - name: Start services
        working-directory: apps/backend-go
        run: |
          docker compose -f docker-compose.yml up -d
          sleep 10

      - name: Health check
        run: |
          curl -f http://localhost:8080/health || exit 1

      - name: Dump logs on failure
        if: failure()
        working-directory: apps/backend-go
        run: docker compose logs

      - name: Stop services
        if: always()
        working-directory: apps/backend-go
        run: docker compose down
