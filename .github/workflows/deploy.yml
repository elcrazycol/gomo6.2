# =============================================================================
# deploy.yml — Build images on GitHub Actions, push to ghcr.io, deploy to VPS
# =============================================================================
# Docker layers are cached via GitHub Actions cache (type=gha).
# Backend always deploys. Frontend builds are non-blocking (continue-on-error).
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   VPS_HOST     — VPS IP or hostname
#   VPS_USER     — SSH username (e.g., root)
#   VPS_SSH_KEY  — Private SSH key for VPS access
#   VPS_PORT     — SSH port (default: 22, optional)
#   GHCR_PAT     — GitHub PAT with read:packages scope (passed to VPS for docker login)
# =============================================================================

name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Backend build (critical — always deploys) ───────────────────────────
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - id: meta
        run: echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: apps/backend-go
          file: apps/backend-go/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/gomo6-backend:latest,ghcr.io/${{ github.repository_owner }}/gomo6-backend:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

  # ── Frontend builds (non-blocking — Docker Hub can be flaky) ────────────
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - id: meta
        run: echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          build-args: VITE_GIT_COMMIT=${{ steps.meta.outputs.sha_short }}
          tags: ghcr.io/${{ github.repository_owner }}/gomo6-web:latest,ghcr.io/${{ github.repository_owner }}/gomo6-web:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

  build-docs:
    name: Build Docs
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - id: meta
        run: echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/docs/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/gomo6-docs:latest,ghcr.io/${{ github.repository_owner }}/gomo6-docs:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha,scope=docs
          cache-to: type=gha,scope=docs,mode=max

  build-dev-dashboard:
    name: Build Dev Dashboard
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - id: meta
        run: echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/dev-dashboard/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/gomo6-dev-dashboard:latest,ghcr.io/${{ github.repository_owner }}/gomo6-dev-dashboard:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha,scope=dev-dashboard
          cache-to: type=gha,scope=dev-dashboard,mode=max

  deploy:
    name: Deploy to VPS
    needs: [build-backend]  # Only block on backend — frontends are optional
    if: always() && !cancelled() && needs.build-backend.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Pull images on VPS and restart
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          command_timeout: 5m
          envs: GHCR_PAT
          script: |
            export GHCR_PAT="$GHCR_PAT"
            set -e
            # Auto-locate the repo directory
            for d in /root/gomo6.2 /home/*/gomo6.2; do
              [ -d "$d" ] && [ -f "$d/docker-compose.yml" ] && { cd "$d"; break; }
            done
            [ "${PWD##*/}" = "gomo6.2" ] || { echo "Cannot find gomo6.2 repo"; exit 1; }
            bash scripts/deploy-vps.sh
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
