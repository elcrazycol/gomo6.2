# =============================================================================
# deploy.yml — Fastest possible deploy
# =============================================================================
# No Docker builds on CI. No image registry push/pull.
# VPS pulls code, builds with local Docker layer cache, restarts.
# Total: ~2-4 min (vs ~10-15 min with CI builds + ghcr push/pull).
# =============================================================================

name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            for d in /root/gomo6.2 /home/*/gomo6.2; do
              [ -d "$d" ] && [ -f "$d/scripts/deploy-vps.sh" ] && { cd "$d"; break; }
            done
            [ "${PWD##*/}" = "gomo6.2" ] || { echo "Cannot find gomo6.2 repo"; exit 1; }
            bash scripts/deploy-vps.sh
