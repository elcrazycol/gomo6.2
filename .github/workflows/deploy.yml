# =============================================================================
# deploy.yml — Build images on GitHub Actions, push to ghcr.io, deploy to VPS
# =============================================================================
# Docker layers are cached via GitHub Actions cache (type=gha).
# First build: 5-7 min. Subsequent builds (cached): ~30-60 sec per changed layer.
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   VPS_HOST     — VPS IP or hostname
#   VPS_USER     — SSH username (e.g., root)
#   VPS_SSH_KEY  — Private SSH key for VPS access
#   VPS_PORT     — SSH port (default: 22, optional)
#   GHCR_PAT     — GitHub PAT with read:packages scope (passed to VPS for docker login)
# =============================================================================

name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        run: |
          echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          echo "registry=ghcr.io/${{ github.repository_owner }}" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Backend (Go) — uses vendored deps, cached Go module layer ──────────
      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: apps/backend-go
          file: apps/backend-go/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.registry }}/gomo6-backend:latest
            ${{ steps.meta.outputs.registry }}/gomo6-backend:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      # ── Web Frontend — npm ci is the slowest part, cached via gha ──────────
      - name: Build & push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          build-args: |
            VITE_GIT_COMMIT=${{ steps.meta.outputs.sha_short }}
          tags: |
            ${{ steps.meta.outputs.registry }}/gomo6-web:latest
            ${{ steps.meta.outputs.registry }}/gomo6-web:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

      # ── Docs Frontend ──────────────────────────────────────────────────────
      - name: Build & push docs
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/docs/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.registry }}/gomo6-docs:latest
            ${{ steps.meta.outputs.registry }}/gomo6-docs:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha,scope=docs
          cache-to: type=gha,scope=docs,mode=max

      # ── Dev Dashboard Frontend ─────────────────────────────────────────────
      - name: Build & push dev-dashboard
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/dev-dashboard/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.registry }}/gomo6-dev-dashboard:latest
            ${{ steps.meta.outputs.registry }}/gomo6-dev-dashboard:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha,scope=dev-dashboard
          cache-to: type=gha,scope=dev-dashboard,mode=max

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Pull images on VPS and restart
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          command_timeout: 5m
          envs: GHCR_PAT
          script: |
            export GHCR_PAT="$GHCR_PAT"
            set -e
            # Auto-locate the repo directory
            for d in /root/gomo6.2 /home/*/gomo6.2; do
              [ -d "$d" ] && [ -f "$d/docker-compose.yml" ] && { cd "$d"; break; }
            done
            [ "${PWD##*/}" = "gomo6.2" ] || { echo "Cannot find gomo6.2 repo"; exit 1; }
            bash scripts/deploy-vps.sh
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
