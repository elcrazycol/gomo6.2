# =============================================================================
# deploy.yml — Build images on GitHub Actions, push to ghcr.io, deploy to VPS
# =============================================================================
# Why: VPS blocks outbound port 443 → npm ci over HTTP crashes.
# Solution: Build on fast GitHub runners (HTTPS works), push to GitHub
# Container Registry (ghcr.io), VPS just pulls pre-built images.
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   VPS_HOST     — VPS IP or hostname
#   VPS_USER     — SSH username (e.g., root)
#   VPS_SSH_KEY  — Private SSH key for VPS access
#   VPS_PORT     — SSH port (default: 22, optional)
#   GHCR_PAT     — GitHub PAT with read:packages scope (passed to VPS for docker login)
# =============================================================================

name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        run: |
          echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          echo "registry=ghcr.io/${{ github.repository_owner }}" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend (Go)
        run: |
          IMG="${{ steps.meta.outputs.registry }}/gomo6-backend"
          docker build -t "$IMG:latest" -t "$IMG:${{ steps.meta.outputs.sha_short }}" -f apps/backend-go/Dockerfile apps/backend-go
          docker push "$IMG:latest"
          docker push "$IMG:${{ steps.meta.outputs.sha_short }}"

      - name: Build & push web frontend
        run: |
          IMG="${{ steps.meta.outputs.registry }}/gomo6-web"
          docker build --build-arg VITE_GIT_COMMIT=${{ steps.meta.outputs.sha_short }} -t "$IMG:latest" -t "$IMG:${{ steps.meta.outputs.sha_short }}" -f apps/web/Dockerfile .
          docker push "$IMG:latest"
          docker push "$IMG:${{ steps.meta.outputs.sha_short }}"

      - name: Build & push docs frontend
        run: |
          IMG="${{ steps.meta.outputs.registry }}/gomo6-docs"
          docker build -t "$IMG:latest" -t "$IMG:${{ steps.meta.outputs.sha_short }}" -f apps/docs/Dockerfile .
          docker push "$IMG:latest"
          docker push "$IMG:${{ steps.meta.outputs.sha_short }}"

      - name: Build & push dev-dashboard frontend
        run: |
          IMG="${{ steps.meta.outputs.registry }}/gomo6-dev-dashboard"
          docker build -t "$IMG:latest" -t "$IMG:${{ steps.meta.outputs.sha_short }}" -f apps/dev-dashboard/Dockerfile .
          docker push "$IMG:latest"
          docker push "$IMG:${{ steps.meta.outputs.sha_short }}"

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Pull images on VPS and restart
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          command_timeout: 5m
          envs: GHCR_PAT
          script: |
            export GHCR_PAT="$GHCR_PAT"
            set -e
            # Auto-locate the repo directory
            for d in /root/gomo6.2 /home/*/gomo6.2; do
              [ -d "$d" ] && [ -f "$d/docker-compose.yml" ] && { cd "$d"; break; }
            done
            [ "${PWD##*/}" = "gomo6.2" ] || { echo "Cannot find gomo6.2 repo"; exit 1; }
            bash scripts/deploy-vps.sh
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
