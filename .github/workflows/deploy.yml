# =============================================================================
# deploy.yml — Build images on GitHub Actions, push to ghcr.io, deploy to VPS
# =============================================================================
# Optimizations:
#   - 4 images build in PARALLEL (matrix strategy)
#   - Docker BuildKit layer caching via GitHub Actions cache
#   - Single docker buildx --push (no separate push step)
#   - VPS pulls all images in parallel, then restarts once
#
# Required GitHub Secrets:
#   VPS_HOST, VPS_USER, VPS_SSH_KEY, VPS_PORT (optional), GHCR_PAT
# =============================================================================

name: Deploy to VPS

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: apps/backend-go
            dockerfile: apps/backend-go/Dockerfile
            build-args: ""
          - service: web
            context: .
            dockerfile: apps/web/Dockerfile
            build-args: "--build-arg VITE_GIT_COMMIT=${{ github.sha }}"
          - service: docs
            context: .
            dockerfile: apps/docs/Dockerfile
            build-args: ""
          - service: dev-dashboard
            context: .
            dockerfile: apps/dev-dashboard/Dockerfile
            build-args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        run: |
          SHA_SHORT=$(echo ${{ github.sha }} | cut -c1-7)
          REGISTRY="ghcr.io/${{ github.repository_owner }}"
          echo "image=${REGISTRY}/gomo6-${{ matrix.service }}" >> $GITHUB_OUTPUT
          echo "sha_short=${SHA_SHORT}" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_short }}
          build-args: ${{ matrix.build-args }}
          no-cache: true

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Pull & restart on VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          command_timeout: 5m
          script: |
            set -e
            # Auto-locate the repo directory
            for d in /root/gomo6.2 /home/*/gomo6.2; do
              [ -d "$d" ] && [ -f "$d/docker-compose.yml" ] && { cd "$d"; break; }
            done
            [ "${PWD##*/}" = "gomo6.2" ] || { echo "Cannot find gomo6.2 repo"; exit 1; }
            # Pull latest code
            git fetch origin main
            git reset --hard origin/main
            # Login to ghcr.io
            [ -n "${{ secrets.GHCR_PAT }}" ] && \
              echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u scramble22 --password-stdin || true
            # Pull all images in parallel, then restart once
            echo "Pulling images..."
            for img in gomo6-backend gomo6-web gomo6-docs gomo6-dev-dashboard; do
              docker pull "ghcr.io/scramble22/${img}:latest" &
            done
            wait
            echo "All images pulled. Restarting..."
            docker compose up -d --remove-orphans --no-build
            docker image prune -f
            echo "=== Deploy done ==="
