# ──────────────────────────────────────────────────────────────────────────────
# release.yml — Релизный workflow
# Запускается только при пуше тега вида v*, v1.2.3, v1.2.3-rc1
# Собирает Docker-образ, пушит в ghcr.io и создаёт GitHub Release.
# ──────────────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  ##############################################################################
  # Проверки перед релизом — быстрые
  ##############################################################################
  check:
    name: Pre-release checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend-go

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: gomo6
          POSTGRES_DB: gomo6
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: apps/backend-go/go.sum

      - name: Build
        run: go build -o /dev/null ./cmd/server/

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          args: --timeout=5m ./...
          working-directory: apps/backend-go

      - name: Apply migrations
        env:
          PGHOST: localhost
          PGUSER: gomo6
          PGDATABASE: gomo6
        run: |
          for f in migrations/0*.sql; do
            psql -q < "$f"
          done
        shell: bash

      - name: Test with race detector
        env:
          DATABASE_URL_TEST: postgres://gomo6@localhost:5432/gomo6?sslmode=disable
          REDIS_URL: redis://localhost:6379/0
        run: go test -race -count=1 ./...

  ##############################################################################
  # Сборка Docker-образа и публикация в ghcr.io
  ##############################################################################
  docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: [check]
    defaults:
      run:
        working-directory: apps/backend-go

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/backend-go
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  ##############################################################################
  # Frontend checks (typecheck + lint)
  ##############################################################################
  frontend:
    name: Frontend (TS typecheck + lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript — web
        run: npx tsc --noEmit -p apps/web/tsconfig.app.json

      - name: TypeScript — dev-dashboard
        run: npx tsc --noEmit -p apps/dev-dashboard/tsconfig.json

      - name: TypeScript — docs
        run: npx tsc --noEmit -p apps/docs/tsconfig.json

      - name: Lint — web
        run: npm run lint --workspace=@gomo6/web

  ##############################################################################
  # GitHub Release
  ##############################################################################
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [docker, frontend]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # нужна для git describe

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Simple changelog from commits since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log --oneline --no-decorate "$PREV_TAG..HEAD" 2>/dev/null)
          else
            LOG=$(git log --oneline --no-decorate -30)
          fi
          {
            echo 'LOG<<EOF'
            echo "$LOG"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.notes.outputs.version }}
          body: |
            ## v${{ steps.notes.outputs.version }}

            ### Changes since last release:
            ```
            ${{ steps.notes.outputs.log }}
            ```

            ### Docker image
            `ghcr.io/${{ github.repository }}:${{ steps.notes.outputs.version }}`
