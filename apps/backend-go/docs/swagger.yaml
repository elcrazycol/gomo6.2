basePath: /api/v1
definitions:
  handlers.DePayCallbackRequest:
    type: object
  handlers.DropsConfigRequest:
    properties:
      drops_amount:
        type: integer
      user_id:
        type: string
    type: object
  handlers.EditMessageRequest:
    properties:
      content:
        maxLength: 4000
        type: string
    required:
    - content
    type: object
  handlers.ManualVerifyRequest:
    properties:
      blockchain:
        type: string
      tx_hash:
        type: string
    required:
    - blockchain
    - tx_hash
    type: object
  handlers.MarkReadRequest:
    properties:
      message_id:
        type: string
    required:
    - message_id
    type: object
  handlers.SendMessageRequest:
    properties:
      client_id:
        type: string
      content:
        maxLength: 4000
        type: string
      parent_message_id:
        type: string
    required:
    - client_id
    - content
    type: object
  handlers.UserStatusResponse:
    properties:
      is_online:
        type: boolean
      last_seen:
        type: string
      user_id:
        type: string
    type: object
  models.APIResponse:
    properties:
      count:
        type: integer
      data: {}
      error:
        type: string
      has_more:
        type: boolean
      next_cursor:
        type: string
      success:
        type: boolean
    type: object
  models.Board:
    properties:
      cover_image_url:
        type: string
      created_at:
        type: string
      description:
        type: string
      gomosub_avatar_url:
        type: string
      gomosub_tags:
        items: {}
        type: array
      id:
        type: string
      is_gomosub:
        type: boolean
      is_rules_board:
        type: boolean
      name:
        type: string
      owner_id:
        type: string
      rules_markdown:
        type: string
      rules_updated_at:
        type: string
      slug:
        type: string
      visibility:
        type: string
    type: object
  models.CreateBotRequest:
    properties:
      description:
        type: string
      display_name:
        type: string
      username:
        type: string
    required:
    - username
    type: object
  models.CreatePostRequest:
    type: object
  models.CreateThreadRequest:
    type: object
  models.RegisterRequest:
    properties:
      display_name:
        type: string
      email:
        type: string
      password:
        type: string
      username:
        type: string
      website:
        description: Honeypot field — must be empty
        type: string
    type: object
  models.SendFriendRequest:
    properties:
      receiver_id:
        type: string
    required:
    - receiver_id
    type: object
  models.SendGiftRequest:
    properties:
      gift_id:
        type: string
      is_anonymous:
        type: boolean
      message:
        type: string
      recipient_id:
        type: string
    required:
    - gift_id
    - recipient_id
    type: object
  models.TransferDropsRequest:
    properties:
      amount:
        minimum: 1
        type: integer
      description:
        type: string
      recipient_address:
        type: string
      recipient_username:
        type: string
    required:
    - amount
    type: object
  oauth.CreateAppRequest:
    properties:
      allowed_scopes:
        items:
          type: string
        type: array
      description:
        type: string
      homepage_url:
        type: string
      is_confidential:
        type: boolean
      logo_url:
        type: string
      name:
        type: string
      redirect_uris:
        items:
          type: string
        type: array
    type: object
info:
  contact:
    name: gomo6 Team
    url: https://gomo6.wtf
  description: gomo6 — open social platform API. Create bots, integrations, and apps.
  license:
    name: MIT
  termsOfService: https://gomo6.wtf/terms
  title: gomo6 API
  version: "1.0"
paths:
  /admin/gifts:
    get:
      description: List all gifts including inactive ones (admin only)
      parameters:
      - default: 100
        description: Max results
        in: query
        name: limit
        type: integer
      - description: Offset for pagination
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.APIResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/models.APIResponse'
      security:
      - BearerAuth: []
      summary: List all gifts (admin)
      tags:
      - Admin
    post:
      consumes:
      - application/json
      description: Create a new gift in the catalog (admin only)
      parameters:
      - description: Gift data
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.APIResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/models.APIResponse'
      security:
      - BearerAuth: []
      summary: Create gift (admin)
      tags:
      - Admin
  /admin/gifts/{id}:
    delete:
      description: Soft-delete a gift by setting is_active=false (admin only)
      parameters:
      - description: Gift ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.APIResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/models.APIResponse'
      security:
      - BearerAuth: []
      summary: Delete gift (admin)
      tags:
      - Admin
    put:
      consumes:
      - application/json
      description: Update a gift in the catalog (admin only)
      parameters:
      - description: Gift ID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.APIResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/models.APIResponse'
      security:
      - BearerAuth: []
      summary: Update gift (admin)
      tags:
      - Admin
  /audio/metadata:
    post:
      consumes:
      - multipart/form-data
      description: Extract metadata (title, artist, album) from an uploaded audio
        file
      parameters:
      - description: Audio file
        in: formData
        name: audio
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: Extract audio metadata
      tags:
      - Audio
  /auth/2fa/disable:
    post:
      description: Disable 2FA for the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.APIResponse'
      security:
      - BearerAuth: []
      summary: Disable TOTP
      tags:
      - Auth
  /auth/2fa/setup:
    post:
      description: Generate a new TOTP secret and provisioning URI for 2FA setup
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.APIResponse'
      security:
      - BearerAuth: []
      summary: Setup TOTP
      tags:
      - Auth
  /auth/2fa/status:
    get:
      description: Returns whether 2FA is enabled and if there is a pending setup
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.APIResponse'
      security:
      - BearerAuth: []
      summary: Get 2FA status
      tags:
      - Auth
  /auth/2fa/verify-and-enable:
    post:
      consumes:
      - application/json
      description: Verify the TOTP code and enable 2FA for the authenticated user
      parameters:
      - description: TOTP verification code
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.APIResponse'
      security:
      - BearerAuth: []
      summary: Verify and enable TOTP
      tags:
      - Auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate with username and password. Returns tokens or partial
        token if 2FA is enabled.
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: Log in
      tags:
      - Auth
  /auth/logout:
    post:
      description: Blacklist access token and revoke all refresh tokens
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.APIResponse'
      security:
      - BearerAuth: []
      summary: Log out
      tags:
      - Auth
  /auth/me:
    get:
      description: Returns the authenticated user's profile
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.APIResponse'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - Auth
  /auth/password:
    post:
      consumes:
      - application/json
      description: Set a new password for the authenticated user
      parameters:
      - description: New password
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.APIResponse'
      security:
      - BearerAuth: []
      summary: Update password
      tags:
      - Auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Exchange a valid refresh token for a new token pair
      parameters:
      - description: Refresh token request
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.APIResponse'
      security:
      - BearerAuth: []
      summary: Refresh access token
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Create a new account with username, password, and optional email
      parameters:
      - description: Registration request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: Register a new user
      tags:
      - Auth
  /auth/verify-2fa:
    post:
      consumes:
      - application/json
      description: Validate a TOTP code during login (requires partial token)
      parameters:
      - description: 2FA verification request
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: Verify 2FA code
      tags:
      - Auth
  /auth/webauthn/credentials:
    get:
      description: Get all registered passkeys for the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.APIResponse'
      security:
      - BearerAuth: []
      summary: List passkeys
      tags:
      - WebAuthn
  /auth/webauthn/credentials/{credentialId}:
    delete:
      description: Remove a registered passkey
      parameters:
      - description: Credential ID (base64url)
        in: path
        name: credentialId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.APIResponse'
      security:
      - BearerAuth: []
      summary: Delete passkey
      tags:
      - WebAuthn
  /auth/webauthn/login/begin:
    get:
      description: Start discoverable passkey authentication
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: Begin passkey login
      tags:
      - WebAuthn
  /auth/webauthn/login/finish:
    post:
      description: Complete passkey authentication and receive JWT tokens
      parameters:
      - description: Session token from BeginLogin
        in: query
        name: session_token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: Finish passkey login
      tags:
      - WebAuthn
  /auth/webauthn/register/begin:
    post:
      description: Start passkey creation flow for the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.APIResponse'
      security:
      - BearerAuth: []
      summary: Begin passkey registration
      tags:
      - WebAuthn
  /auth/webauthn/register/finish:
    post:
      description: Complete passkey creation flow
      parameters:
      - description: Passkey name
        in: query
        name: name
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.APIResponse'
      security:
      - BearerAuth: []
      summary: Finish passkey registration
      tags:
      - WebAuthn
  /boards:
    get:
      description: Get a list of boards with optional filters
      parameters:
      - description: Filter by slug
        in: query
        name: slug
        type: string
      - description: Filter gomosub boards
        in: query
        name: is_gomosub
        type: string
      - description: Filter by visibility (public/private)
        in: query
        name: visibility
        type: string
      - default: 50
        description: Max results (1-100)
        in: query
        name: limit
        type: integer
      - description: Offset for pagination
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: List boards
      tags:
      - Boards
    post:
      consumes:
      - application/json
      description: Create a new board
      parameters:
      - description: Board data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.Board'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.APIResponse'
      security:
      - BearerAuth: []
      summary: Create a board
      tags:
      - Boards
  /boards/{id}:
    get:
      description: Get a board by its slug
      parameters:
      - description: Board slug
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: Get board by slug
      tags:
      - Boards
    put:
      consumes:
      - application/json
      description: Update board settings (owner only)
      parameters:
      - description: Board ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/models.APIResponse'
      security:
      - BearerAuth: []
      summary: Update board
      tags:
      - Boards
  /boards/{id}/invites:
    get:
      description: Get all invites for a board (owner only)
      parameters:
      - description: Board ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/models.APIResponse'
      security:
      - BearerAuth: []
      summary: List board invites
      tags:
      - Boards
    post:
      consumes:
      - application/json
      description: Create an invite link for a private gomosub (owner only)
      parameters:
      - description: Board ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.APIResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/models.APIResponse'
      security:
      - BearerAuth: []
      summary: Create invite
      tags:
      - Boards
  /boards/{id}/invites/{inviteId}:
    delete:
      description: Deactivate an invite link (owner only)
      parameters:
      - description: Board ID
        in: path
        name: id
        required: true
        type: string
      - description: Invite ID
        in: path
        name: inviteId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.APIResponse'
      security:
      - BearerAuth: []
      summary: Delete invite
      tags:
      - Boards
  /bots:
    get:
      description: List all bots owned by the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.APIResponse'
      security:
      - BearerAuth: []
      summary: List bots
      tags:
      - Bots
    post:
      consumes:
      - application/json
      description: Create a new bot (max 5 per account)
      parameters:
      - description: Bot configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.CreateBotRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.APIResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/models.APIResponse'
      security:
      - BearerAuth: []
      summary: Create bot
      tags:
      - Bots
  /bots/{id}:
    delete:
      description: Delete a bot and its associated user account
      parameters:
      - description: Bot ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.APIResponse'
      security:
      - BearerAuth: []
      summary: Delete bot
      tags:
      - Bots
    get:
      description: Get a bot by ID
      parameters:
      - description: Bot ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.APIResponse'
      security:
      - BearerAuth: []
      summary: Get bot
      tags:
      - Bots
    put:
      consumes:
      - application/json
      description: Update bot display name and description
      parameters:
      - description: Bot ID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.APIResponse'
      security:
      - BearerAuth: []
      summary: Update bot
      tags:
      - Bots
  /bots/{id}/regenerate-token:
    post:
      description: Generate a new token for a bot (old token is invalidated)
      parameters:
      - description: Bot ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
