# Echo request Origin for local dev hosts; otherwise *.
# (Must be a single ACAO — duplicate headers from Garage bucket CORS + nginx break browsers.)
map $http_origin $garage_proxy_cors_origin {
  default "*";
  ~^https?://localhost(:[0-9]+)?$ $http_origin;
  ~^https?://127\.0\.0\.1(:[0-9]+)?$ $http_origin;
}

server {
  listen 3900;
  server_name _;

  # Prevent access logs from recording client IPs/user agents.
  access_log off;
  error_log /dev/null warn;

  client_max_body_size 0;

  # Garage also emits CORS from bucket policy; strip it so only one ACAO is sent.
  proxy_hide_header Access-Control-Allow-Origin;
  proxy_hide_header Access-Control-Allow-Methods;
  proxy_hide_header Access-Control-Allow-Headers;
  proxy_hide_header Access-Control-Expose-Headers;
  proxy_hide_header Access-Control-Max-Age;
  proxy_hide_header Access-Control-Allow-Credentials;

  # Allow CORS from the browser frontend (presigned PUT/GET cross-origin).
  add_header Access-Control-Allow-Origin $garage_proxy_cors_origin always;
  add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, HEAD" always;
  add_header Access-Control-Allow-Headers "Origin, Access-Control-Request-Method, Access-Control-Request-Headers, content-type, Content-Type" always;
  add_header Access-Control-Max-Age "3600" always;
  add_header Vary "Origin" always;

  if ($request_method = OPTIONS) {
    return 204;
  }

  location / {
    proxy_pass http://garage:3900;

    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto http;

    proxy_http_version 1.1;
    proxy_buffering off;
  }
}

