services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: gomo6
      POSTGRES_USER: gomo6
      POSTGRES_PASSWORD: gomo6password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  garage:
    image: dxflrs/garage:v1.3.1
    ports:
      - "3901:3901"
    volumes:
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
      - ./garage.toml:/etc/garage.toml:ro
    command: ["/garage", "-c", "/etc/garage.toml", "server"]

  garage-init:
    image: alpine:3.23
    depends_on:
      garage:
        condition: service_started
    network_mode: service:garage
    pid: service:garage
    environment:
      GARAGE_ADMIN_TOKEN: garage-admin-token
    restart: "on-failure:2"
    entrypoint:
      - /bin/sh
      - -eu
      - -c
      - |
        # chroot into the garage container so we can run the garage binary
        G="chroot /proc/1/root /garage -c /etc/garage.toml"

        # Wait for Garage RPC
        for i in $(seq 1 180); do
          if $G node id -q >/dev/null 2>&1; then break; fi
          echo "Waiting for Garage RPC... ($i/180)"
          sleep 2
        done
        $G node id -q >/dev/null 2>&1 || { echo "Garage RPC not ready"; exit 1; }

        # Always ensure layout is assigned (idempotent via || true)
        NODE_ID=$($G node id -q | cut -c1-16)
        $G layout assign "$NODE_ID" -z local -c 1G || true
        $G layout apply --version 1 || true

        # Import a stable key for our backend S3 client
        $G key import --yes -n gomo6-s3 \
          GK3515373e4c851ebaad366558 \
          7d37d093435a41f2aab8f13c19ba067d9776c90215f56614adad6ece597dbb34 || true

        # Create and allow buckets used by the frontend
        $G bucket create content || true
        $G bucket allow content --key gomo6-s3 --read --write || true

        $G bucket create post-images || true
        $G bucket allow post-images --key gomo6-s3 --read --write || true

        echo "Garage initialized."

  garage-proxy:
    image: nginx:1.27-alpine
    container_name: gomo6-garage-proxy
    depends_on:
      - garage
    ports:
      - "3900:3900"
    volumes:
      - ./garage-nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro

  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://gomo6:gomo6password@postgres:5432/gomo6?sslmode=disable
      REDIS_URL: redis://redis:6379
      # For production: replace with a fixed value (openssl rand -hex 32) so tokens survive restarts
      JWT_SECRET: dev-auto-generated-each-restart
      SERVER_DOMAIN: localhost:8080
      FEDERATION_KEY: your-federation-key-change-in-production
      ENVIRONMENT: development
      SUPABASE_ANON_KEY: your-anon-key
      # WebSocket security - allowed origins for CORS
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:8080,http://localhost:3000,http://localhost:8081
      # Garage S3 (replaces MinIO)
      # Backend connects directly to Garage for S3 API (with AWS Signature)
      GARAGE_S3_ENDPOINT: http://garage:3900
      GARAGE_S3_REGION: garage
      GARAGE_S3_ACCESS_KEY: GK3515373e4c851ebaad366558
      GARAGE_S3_SECRET_KEY: 7d37d093435a41f2aab8f13c19ba067d9776c90215f56614adad6ece597dbb34
      GARAGE_S3_USE_SSL: false
      # Browser uses garage-proxy for CORS-enabled access
      GARAGE_S3_PUBLIC_ENDPOINT: http://localhost:3900
    depends_on:
      - postgres
      - redis
      - garage-init
    volumes:
      - .:/app

volumes:
  postgres_data:
  redis_data:
  garage_meta:
  garage_data:
