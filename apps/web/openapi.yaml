      responses:
        "200":
          description: Токены отозваны

  # ════════════════════════════════════════════════════════════════════════════
  # Storage
  # ════════════════════════════════════════════════════════════════════════════
  /storage/v1/object/{bucket}/{key}:
    get:
      summary: Получить объект из хранилища
      tags: [Storage]
      security: []
      parameters:
        - name: bucket
          in: path
          required: true
          schema:
            type: string
            enum: [post-images, avatars]
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Файл
          content:
            image/*:
              schema:
                type: string
                format: binary
    delete:
      summary: Удалить объект
      tags: [Storage]
      parameters:
        - name: bucket
          in: path
          required: true
          schema:
            type: string
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Удалён

  /storage/v1/upload:
    post:
      summary: Загрузить файл
      tags: [Storage]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Загружен

  # ════════════════════════════════════════════════════════════════════════════
  # Universal tables (CRUD через HandleTableRequest)
  # ════════════════════════════════════════════════════════════════════════════
  /api/v1/{table}:
    parameters:
      - $ref: "#/components/parameters/UniversalTable"
    get:
      summary: Получить записи
      tags: [Universal]
      security: []
      parameters:
        - $ref: "#/components/parameters/UniversalFilter"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Записи
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UniversalResponse"
    post:
      summary: Создать запись
      tags: [Universal]
      responses:
        "200":
          description: Создана
    put:
      summary: Обновить запись
      tags: [Universal]
      responses:
        "200":
          description: Обновлена
    delete:
      summary: Удалить запись
      tags: [Universal]
      responses:
        "200":
          description: Удалена

  /api/v1/{table}/{path}:
    parameters:
      - $ref: "#/components/parameters/UniversalTable"
      - name: path
        in: path
        schema:
          type: string
    get:
      summary: Получить запись по ID
      tags: [Universal]
      security: []
      responses:
        "200":
          description: Запись
    put:
      summary: Обновить запись по ID
      tags: [Universal]
      responses:
        "200":
          description: Обновлена
    delete:
      summary: Удалить запись по ID
      tags: [Universal]
      responses:
        "200":
          description: Удалена

  # ════════════════════════════════════════════════════════════════════════════
  # WebSocket
  # ════════════════════════════════════════════════════════════════════════════
  /ws:
    get:
      summary: WebSocket-соединение
      description: |
        Аутентификация через первое сообщение `{"type":"auth","token":"<jwt>"}`.
        После аутентификации поддерживаются:
        - Подписка на каналы (threads, messenger)
        - Получение real-time уведомлений
        - Статусы печати / присутствия
      tags: [WebSocket]
      security: []
      responses:
        "101":
          description: WebSocket upgrade
  /ws/stats:
    get:
      summary: Статистика WebSocket-соединений
      tags: [WebSocket]
      responses:
        "200":
          description: Статистика

  # ════════════════════════════════════════════════════════════════════════════
  # Federation (stubs)
  # ════════════════════════════════════════════════════════════════════════════
  /federation/users/{identifier}:
    get:
      summary: Пользователь по identifier@domain
      tags: [Federation]
      security: []
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            type: string
      responses:
        "501":
          $ref: "#/components/responses/NotImplemented"

  /federation/gomosubs/{slug}:
    get:
      summary: GomoSub по slug
      tags: [Federation]
      security: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "501":
          $ref: "#/components/responses/NotImplemented"

  /federation/servers:
    get:
      summary: Список федеративных серверов
      tags: [Federation]
      security: []
      responses:
        "501":
          $ref: "#/components/responses/NotImplemented"

  /api/v1/test-auth:
    get:
      summary: Тестовый эндпоинт аутентификации
      tags: [Auth]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: string
                  message:
                    type: string

# ══════════════════════════════════════════════════════════════════════════════
# Components
# ══════════════════════════════════════════════════════════════════════════════
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Основной JWT-токен (access token)
    oauthBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: OAuth access-токен (для /oauth/userinfo)

  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
    CredentialId:
      name: credentialId
      in: path
      required: true
      schema:
        type: string
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
    Offset:
      name: offset
      in: query
      schema:
        type: integer
        default: 0
        minimum: 0

    # ── OAuth Parameters ────────────────────────────────────────────────────
    OAuthResponseType:
      name: response_type
      in: query
      required: true
      schema:
        type: string
        enum: [code]
    OAuthClientId:
      name: client_id
      in: query
      required: true
      schema:
        type: string
    OAuthRedirectUri:
      name: redirect_uri
      in: query
      required: true
      schema:
        type: string
    OAuthScope:
      name: scope
      in: query
      schema:
        type: string
    OAuthState:
      name: state
      in: query
      schema:
        type: string

    # ── Universal ───────────────────────────────────────────────────────────
    UniversalTable:
      name: table
      in: path
      required: true
      schema:
        type: string
        enum:
          - user_roles
          - gomosub_memberships
          - user_session_time
          - user_achievements
          - achievements
          - user_terms_acceptance
          - profile_customization
          - user_placeholders
          - polls
          - poll_votes
          - thread_subscriptions
          - privacy_settings
          - user_daily_visits
          - thread_custom_message_visits
          - profile_wall_posts
          - profile_wall_post_comments
          - profile_wall_post_likes
          - profile_wall_post_reposts
          - gomosub_rules_acceptance
          - reports
          - user_bans
          - user_settings_changes
    UniversalFilter:
      name: filter
      in: query
      style: deepObject
      schema:
        type: object
        description: "Фильтр: field=op:value, e.g. user_id=eq:abc123. Ops: eq, neq, gt, gte, lt, lte, like, ilike, in, is, isnot"

  responses:
    BadRequest:
      description: Ошибка валидации
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIResponse"
    Unauthorized:
      description: Требуется аутентификация
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIResponse"
    NotFound:
      description: Не найдено
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIResponse"
    TooManyRequests:
      description: Слишком много запросов
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIResponse"
    NotImplemented:
      description: Ещё не реализовано
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIResponse"
    OAuthError:
      description: Ошибка OAuth
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/OAuthError"

  schemas:
    # ── Generic ──────────────────────────────────────────────────────────────
    APIResponse:
      type: object
      properties:
        success:
          type: boolean
        data: {}
        error:
          type: string
        count:
          type: integer
        has_more:
          type: boolean
        next_cursor:
          type: string

    # ── User ─────────────────────────────────────────────────────────────────
    User:
      type: object
      required: [id, username, email, domain, is_online, created_at, is_remote, is_anonymous]
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
        domain:
          type: string
        avatar_url:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        garma:
          type: integer
          nullable: true
        post_count:
          type: integer
          nullable: true
        thread_count:
          type: integer
          nullable: true
        is_online:
          type: boolean
        last_seen:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        is_remote:
          type: boolean
        is_anonymous:
          type: boolean

    APIResponse_User:
      allOf:
        - $ref: "#/components/schemas/APIResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/User"

    APIResponse_UserArray:
      allOf:
        - $ref: "#/components/schemas/APIResponse"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/User"

    # ── Board ────────────────────────────────────────────────────────────────
    Board:
      type: object
      required: [id, slug, name, is_gomosub, is_rules_board, created_at]
      properties:
        id:
          type: string
        slug:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        is_gomosub:
          type: boolean
        is_rules_board:
          type: boolean
        owner_id:
          type: string
          nullable: true
        gomosub_avatar_url:
          type: string
          nullable: true
        cover_image_url:
          type: string
          nullable: true
        gomosub_tags:
          type: array
          items:
            type: string
          nullable: true
        rules_markdown:
          type: string
          nullable: true
        rules_updated_at:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    BoardUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        is_gomosub:
          type: boolean
        is_rules_board:
          type: boolean
        gomosub_avatar_url:
          type: string
        cover_image_url:
          type: string

    APIResponse_Board:
      allOf:
        - $ref: "#/components/schemas/APIResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/Board"

    APIResponse_BoardArray:
      allOf:
        - $ref: "#/components/schemas/APIResponse"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/Board"

    Thread:
      type: object
      required: [id, board_id, title, content, post_count, server_domain, created_at, updated_at, is_remote]
      properties:
        id:
          type: string
        board_id:
          type: string
        user_id:
          type: string
          nullable: true
        title:
          type: string
        content:
          type: string
        content_json:
          type: object
          nullable: true
        image_url:
          type: string
          nullable: true
        image_urls:
          type: array
          items:
            type: string
          nullable: true
        attachments:
          type: array
          nullable: true
          items:
            type: object
            properties:
              url:
                type: string
              type:
                type: string
              name:
                type: string
        post_count:
          type: integer
        server_domain:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        is_remote:
          type: boolean

    ThreadWithBoards:
      allOf:
        - $ref: "#/components/schemas/Thread"
        - type: object
          required: [username, boards]
          properties:
            tags:
              type: array
              items:
                type: string
              nullable: true
            username:
              type: string
            avatar_url:
              type: string
              nullable: true
            boards:
              type: object
              required: [slug, name]
              properties:
                slug:
                  type: string
                name:
                  type: string
                is_gomosub:
                  type: boolean
                is_rules_board:
                  type: boolean

    ThreadUpdate:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        content_json:
          type: object
        image_urls:
          type: array
          items:
            type: string

    APIResponse_ThreadWithBoards:
      allOf:
        - $ref: "#/components/schemas/APIResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/ThreadWithBoards"

    APIResponse_ThreadWithBoardsArray:
      allOf:
        - $ref: "#/components/schemas/APIResponse"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/ThreadWithBoards"

    CreateThreadRequest:
      type: object
      required: [board_id, title, content]
      properties:
        board_id:
          type: string
        title:
          type: string
        content:
          type: string
        content_json:
          type: object
        image_urls:
          type: array
          items:
            type: string
        attachments:
          type: array
        poll:
          $ref: "#/components/schemas/PollRequest"

    PollRequest:
      type: object
      properties:
        question:
          type: string
        options:
          type: array
          items:
            $ref: "#/components/schemas/PollOption"
        allow_multiple:
          type: boolean
        show_results:
          type: boolean
        allow_change_vote:
          type: boolean

    PollOption:
      type: object
      properties:
        id:
          type: string
        text:
          type: string

    Post:
      type: object
      required: [id, thread_id, content, is_private, server_domain, created_at, is_remote, username]
      properties:
        id:
          type: string
        thread_id:
          type: string
        user_id:
          type: string
          nullable: true
        content:
          type: string
        content_json:
          type: object
          nullable: true
        image_url:
          type: string
          nullable: true
        image_urls:
          type: array
          items:
            type: string
          nullable: true
        attachments:
          type: array
          nullable: true
          items:
            type: object
            properties:
              url:
                type: string
              type:
                type: string
              name:
                type: string
        reply_to:
          type: string
          nullable: true
        is_private:
          type: boolean
        private_recipient_id:
          type: string
          nullable: true
        server_domain:
          type: string
        created_at:
          type: string
          format: date-time
        is_remote:
          type: boolean
        username:
          type: string
        avatar_url:
          type: string
          nullable: true

    PostUpdate:
      type: object
      properties:
        content:
          type: string
        content_json:
          type: object
        image_urls:
          type: array
          items:
            type: string

    CreatePostRequest:
      type: object
      required: [thread_id, content]
      properties:
        thread_id:
          type: string
        content:
          type: string
        content_json:
          type: object
        image_urls:
          type: array
          items:
            type: string
        attachments:
          type: array
        reply_to:
          type: string
        is_private:
          type: boolean
        private_recipient_id:
          type: string
        thread_server_domain:
          type: string

    APIResponse_Post:
      allOf:
        - $ref: "#/components/schemas/APIResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/Post"

    APIResponse_PostArray:
      allOf:
        - $ref: "#/components/schemas/APIResponse"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/Post"

    # ── Likes ────────────────────────────────────────────────────────────────
    PostLike:
      type: object
      required: [id, post_id, user_id, created_at]
      properties:
        id:
          type: string
        post_id:
          type: string
        user_id:
          type: string
        created_at:
          type: string

    ThreadLike:
      type: object
      required: [id, thread_id, user_id, created_at]
      properties:
        id:
          type: string
        thread_id:
          type: string
        user_id:
          type: string
        created_at:
          type: string

    APIResponse_ThreadLikeArray:
      allOf:
        - $ref: "#/components/schemas/APIResponse"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/ThreadLike"

    # ── Notification ─────────────────────────────────────────────────────────
    Notification:
      type: object
      required: [id, user_id, type, title, message, is_read, created_at]
      properties:
        id:
          type: string
        user_id:
          type: string
        type:
          type: string
        title:
          type: string
        message:
          type: string
        related_thread_id:
          type: string
          nullable: true
        related_post_id:
          type: string
          nullable: true
        is_read:
          type: boolean
        created_at:
          type: string

    APIResponse_NotificationArray:
      allOf:
        - $ref: "#/components/schemas/APIResponse"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/Notification"

    # ── Auth ─────────────────────────────────────────────────────────────────
    RegisterRequest:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        challenge_id:
          type: string
        solution:
          type: string
        captcha_token:
          type: string
        website:
          type: string
          description: Honeypot — должен быть пустым

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        device_id:
          type: string
          description: ID устройства для trusted device (читается отдельно от ShouldBindJSON)

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
          description: JWT access-токен
        refresh_token:
          type: string
        user:
          $ref: "#/components/schemas/User"
        needs_2fa:
          type: boolean
          description: true если требуется второй фактор
        expires_in:
          type: integer
          description: Время жизни токена в секундах

    TOTPSetupResponse:
      type: object
      required: [secret, uri]
      properties:
        secret:
          type: string
        uri:
          type: string
          description: otpauth:// URI для QR-кода

    TwoFAStatus:
      type: object
      required: [enabled, has_pending_secret]
      properties:
        enabled:
          type: boolean
        has_pending_secret:
          type: boolean

    # ── RPC ──────────────────────────────────────────────────────────────────
    APIResponse_Int:
      allOf:
        - $ref: "#/components/schemas/APIResponse"
        - type: object
          properties:
            data:
              type: integer

    APIResponse_Bool:
      allOf:
        - $ref: "#/components/schemas/APIResponse"
        - type: object
          properties:
            data:
              type: boolean

    # ── User Status ──────────────────────────────────────────────────────────
    UserStatusResponse:
      type: object
      required: [user_id, is_online]
      properties:
        user_id:
          type: string
        is_online:
          type: boolean
        last_seen:
          type: string
          format: date-time
          nullable: true

    # ── Messenger ────────────────────────────────────────────────────────────
    ConversationResponse:
      type: object
      required: [id, updated_at, unread_count, is_muted, other_user_id, other_username]
      properties:
        id:
          type: string
        last_message_at:
          type: string
          nullable: true
        last_message_preview:
          type: string
          nullable: true
        last_message_sender_id:
          type: string
          nullable: true
        pinned_message_id:
          type: string
          nullable: true
        updated_at:
          type: string
        unread_count:
          type: integer
        last_read_at:
          type: string
          nullable: true
        is_muted:
          type: boolean
        other_user_id:
          type: string
        other_username:
          type: string
        other_avatar_url:
          type: string
          nullable: true
        other_account_num:
          type: integer
          nullable: true
        other_is_online:
          type: boolean
          nullable: true
        other_last_seen_at:
          type: string
          nullable: true

    MessageResponse:
      type: object
      required: [id, conversation_id, sender_user_id, content, is_edited, is_deleted, sent_at, client_id]
      properties:
        id:
          type: string
        conversation_id:
          type: string
        sender_user_id:
          type: string
        parent_message_id:
          type: string
          nullable: true
        content:
          type: string
        is_edited:
          type: boolean
        is_deleted:
          type: boolean
        edited_at:
          type: string
          nullable: true
        sent_at:
          type: string
        client_id:
          type: string

    SendMessageRequest:
      type: object
      required: [content, client_id]
      properties:
        content:
          type: string
          maxLength: 4000
        client_id:
          type: string
          description: Идемпотентный ключ клиента
        parent_message_id:
          type: string

    # ── Bots ─────────────────────────────────────────────────────────────────
    Bot:
      type: object
      required: [id, owner_id, username, display_name, lua_code, token, is_active, created_at, updated_at]
      properties:
        id:
          type: string
        owner_id:
          type: string
        username:
          type: string
        display_name:
          type: string
        avatar_url:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        lua_code:
          type: string
        token:
          type: string
        is_active:
          type: boolean
        created_at:
          type: string
        updated_at:
          type: string

    CreateBotRequest:
      type: object
      required: [username, display_name]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
        display_name:
          type: string
          minLength: 1
          maxLength: 100
        avatar_url:
          type: string
        description:
          type: string
        lua_code:
          type: string

    UpdateBotRequest:
      type: object
      properties:
        display_name:
          type: string
        avatar_url:
          type: string
        description:
          type: string
        lua_code:
          type: string
        is_active:
          type: boolean

    BotLog:
      type: object
      required: [id, bot_id, level, message, created_at]
      properties:
        id:
          type: string
        bot_id:
          type: string
        level:
          type: string
        message:
          type: string
        context:
          type: object
        created_at:
          type: string

    BotStats:
      type: object
      required: [id, bot_id, messages_sent, messages_received, commands_processed, errors_count, date]
      properties:
        id:
          type: string
        bot_id:
          type: string
        messages_sent:
          type: integer
        messages_received:
          type: integer
        commands_processed:
          type: integer
        errors_count:
          type: integer
        date:
          type: string

    # ── OAuth ────────────────────────────────────────────────────────────────
    OAuthApplication:
      type: object
      required: [id, owner_id, name, description, client_id, redirect_uris, allowed_scopes, is_confidential, logo_url, homepage_url, is_active, created_at, updated_at]
      properties:
        id:
          type: string
        owner_id:
          type: string
        name:
          type: string
        description:
          type: string
        client_id:
          type: string
        redirect_uris:
          type: array
          items:
            type: string
        allowed_scopes:
          type: array
          items:
            type: string
        is_confidential:
          type: boolean
        logo_url:
          type: string
        homepage_url:
          type: string
        is_active:
          type: boolean
        created_at:
          type: string
        updated_at:
          type: string

    TokenRequest_Form:
      type: object
      required: [grant_type]
      properties:
        grant_type:
          type: string
          enum: [authorization_code, refresh_token]
        code:
          type: string
        redirect_uri:
          type: string
        client_id:
          type: string
        client_secret:
          type: string
        code_verifier:
          type: string
        refresh_token:
          type: string
        scope:
          type: string

    TokenResponse:
      type: object
      required: [access_token, token_type, expires_in]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          example: 3600
        id_token:
          type: string
        refresh_token:
          type: string
        scope:
          type: string

    RevokeRequest_Form:
      type: object
      required: [token]
      properties:
        token:
          type: string
        token_type_hint:
          type: string
          enum: [access_token, refresh_token]
        client_id:
          type: string
        client_secret:
          type: string

    IntrospectRequest_Form:
      type: object
      required: [token]
      properties:
        token:
          type: string
        token_type_hint:
          type: string
        client_id:
          type: string
        client_secret:
          type: string

    IntrospectResponse:
      type: object
      required: [active]
      properties:
        active:
          type: boolean
        scope:
          type: string
        client_id:
          type: string
        user_id:
          type: string
        token_id:
          type: string
        token_type:
          type: string
        exp:
          type: integer
        iat:
          type: integer
        sub:
          type: string
        username:
          type: string
        aud:
          type: array
          items:
            type: string
        iss:
          type: string

    UserInfoResponse:
      type: object
      required: [sub]
      properties:
        sub:
          type: string
        name:
          type: string
        preferred_username:
          type: string
        email:
          type: string
        email_verified:
          type: boolean
        picture:
          type: string

    OpenIDConfiguration:
      type: object
      properties:
        issuer:
          type: string
        authorization_endpoint:
          type: string
        token_endpoint:
          type: string
        userinfo_endpoint:
          type: string
        revocation_endpoint:
          type: string
        introspection_endpoint:
          type: string
        jwks_uri:
          type: string
        scopes_supported:
          type: array
          items:
            type: string
        response_types_supported:
          type: array
          items:
            type: string
        grant_types_supported:
          type: array
          items:
            type: string
        token_endpoint_auth_methods_supported:
          type: array
          items:
            type: string
        claims_supported:
          type: array
          items:
            type: string
        subject_types_supported:
          type: array
          items:
            type: string
        id_token_signing_alg_values_supported:
          type: array
          items:
            type: string
        code_challenge_methods_supported:
          type: array
          items:
            type: string

    OAuthError:
      type: object
      properties:
        error:
          type: string
          enum: [invalid_request, unauthorized_client, access_denied, unsupported_response_type, invalid_scope, server_error, temporarily_unavailable, invalid_grant, invalid_client, unsupported_grant_type]
        error_description:
          type: string
        state:
          type: string

    # ── Developer ────────────────────────────────────────────────────────────
    CreateAppRequest:
      type: object
      required: [name, redirect_uris]
      properties:
        name:
          type: string
        description:
          type: string
        redirect_uris:
          type: array
          items:
            type: string
        allowed_scopes:
          type: array
          items:
            type: string
        is_confidential:
          type: boolean
        logo_url:
          type: string
        homepage_url:
          type: string

    UpdateAppRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        redirect_uris:
          type: array
          items:
            type: string
        allowed_scopes:
          type: array
          items:
            type: string
        logo_url:
          type: string
        homepage_url:
          type: string
        is_active:
          type: boolean

    CreateAppResponse:
      type: object
      required: [app, client_secret]
      properties:
        app:
          $ref: "#/components/schemas/OAuthApplication"
        client_secret:
          type: string
          description: Показывается один раз!

    # ── Universal ────────────────────────────────────────────────────────────
    UniversalResponse:
      allOf:
        - $ref: "#/components/schemas/APIResponse"
        - type: object
          properties:
            data:
              type: array
              items:
                type: object

