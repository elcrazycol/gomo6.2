  # ════════════════════════════════════════════════════════════════════════════
  # OAuth 2.0 / OpenID Connect
  # ════════════════════════════════════════════════════════════════════════════
  /oauth/authorize:
    get:
      summary: OAuth Authorize endpoint
      tags: [OAuth]
      security: []
      parameters:
        - $ref: "#/components/parameters/OAuthResponseType"
        - $ref: "#/components/parameters/OAuthClientId"
        - $ref: "#/components/parameters/OAuthRedirectUri"
        - $ref: "#/components/parameters/OAuthScope"
        - $ref: "#/components/parameters/OAuthState"
        - name: code_challenge
          in: query
          schema:
            type: string
        - name: code_challenge_method
          in: query
          schema:
            type: string
            enum: [S256, plain]
        - name: nonce
          in: query
          schema:
            type: string
      responses:
        "302":
          description: Редирект на фронтенд (consent page) или redirect_uri с code
        "400":
          $ref: "#/components/responses/OAuthError"

  /oauth/token:
    post:
      summary: Обменять code на токены
      tags: [OAuth]
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/TokenRequest_Form"
      responses:
        "200":
          description: Токены
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          $ref: "#/components/responses/OAuthError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /oauth/revoke:
    post:
      summary: Отозвать токен
      tags: [OAuth]
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/RevokeRequest_Form"
      responses:
        "200":
          description: Токен отозван (или уже был отозван — RFC 7009)
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /oauth/introspect:
    post:
      summary: Интроспекция токена (RFC 7662)
      tags: [OAuth]
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/IntrospectRequest_Form"
      responses:
        "200":
          description: Результат интроспекции
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntrospectResponse"

  /oauth/userinfo:
    get:
