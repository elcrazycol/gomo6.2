openapi: "3.0.3"
info:
  title: Gomo6 API
  description: |
    REST API для социальной платформы Gomo6.
    Все защищённые эндпоинты требуют Bearer-токен в заголовке `Authorization: Bearer <jwt>`.
  version: "1.0.1"
  contact:
    name: Gomo6 Team

servers:
  - url: https://{domain}
    description: Production (Docker/Caddy)
    variables:
      domain:
        default: gomo6.local
  - url: http://localhost:8080
    description: Local dev backend (direct)

security:
  - bearerAuth: []

paths:
  # ════════════════════════════════════════════════════════════════════════════
  # Health
  # ════════════════════════════════════════════════════════════════════════════
  /ready:
    get:
      summary: Проверка готовности
      description: Возвращает OK если весь стек (БД, Redis, WebSocket) инициализирован.
      tags: [Health]
      security: []
      responses:
        "200":
          description: Сервис готов
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  websocket:
                    type: boolean

  # ════════════════════════════════════════════════════════════════════════════
  # Auth
  # ════════════════════════════════════════════════════════════════════════════
  /api/v1/auth/captcha-config:
    get:
      summary: Конфигурация CAPTCHA
      tags: [Auth]
      security: []
      responses:
        "200":
          description: Конфигурация
          content:
            application/json:
              schema:
                type: object
                properties:
                  difficulty:
                    type: integer
                    example: 20
                  enabled:
                    type: boolean

  /api/v1/auth/captcha-challenge:
    get:
      summary: Получить CAPTCHA challenge (Proof-of-Work)
      tags: [Auth]
      security: []
      responses:
        "200":
          description: Challenge для PoW
          content:
            application/json:
              schema:
                type: object
                properties:
                  challenge_id:
                    type: string
                  challenge:
                    type: string
                  difficulty:
                    type: integer

  /api/v1/auth/register:
    post:
      summary: Регистрация
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Успешная регистрация
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/auth/login:
    post:
      summary: Логин
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Успешный логин (или запрос 2FA)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/auth/verify-2fa:
    post:
      summary: Подтверждение 2FA при логине
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, code]
              properties:
                token:
                  type: string
                  description: Частичный токен из ответа логина
                code:
                  type: string
                  description: TOTP-код (6 цифр)
                device_id:
                  type: string
                trust_device:
                  type: boolean
      responses:
        "200":
          description: 2FA подтверждён, полный токен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /api/v1/auth/refresh:
    post:
      summary: Обновление access-токена
      tags: [Auth]
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
      responses:
        "200":
          description: Новый токен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /api/v1/auth/logout:
    post:
      summary: Выход (инвалидация токенов)
      tags: [Auth]
      responses:
        "200":
          description: Успешный выход
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIResponse"

  /api/v1/auth/me:
    get:
      summary: Текущий пользователь
      tags: [Auth]
      responses:
        "200":
          description: Профиль
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIResponse_User"

  /api/v1/auth/password:
    post:
      summary: Смена пароля
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
                  minLength: 8
      responses:
        "200":
          description: Пароль изменён
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  # ── 2FA ────────────────────────────────────────────────────────────────────
  /api/v1/auth/2fa/setup:
    post:
      summary: Сгенерировать TOTP-секрет
      tags: [Auth, 2FA]
      responses:
        "200":
          description: Секрет и URI
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TOTPSetupResponse"

  /api/v1/auth/2fa/verify-and-enable:
    post:
      summary: Подтвердить и включить TOTP
      tags: [Auth, 2FA]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
      responses:
        "200":
          description: TOTP включён
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:
                    type: boolean
                  recovery_codes:
                    type: array
                    items:
                      type: string

  /api/v1/auth/2fa/disable:
    post:
      summary: Отключить TOTP
      tags: [Auth, 2FA]
      responses:
        "200":
          description: TOTP отключён

  /api/v1/auth/2fa/status:
    get:
      summary: Статус 2FA
      tags: [Auth, 2FA]
      responses:
        "200":
          description: Статус
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TwoFAStatus"

  # ── WebAuthn / Passkeys ────────────────────────────────────────────────────
  /api/v1/auth/webauthn/login/begin:
    get:
      summary: Начать passkey-логин
      tags: [Auth, WebAuthn]
      security: []
      responses:
        "200":
          description: Опции для navigator.credentials.get()
          content:
            application/json:
              schema:
                type: object
                properties:
                  options:
                    type: object
                  session_token:
                    type: string

  /api/v1/auth/webauthn/login/finish:
    post:
      summary: Завершить passkey-логин
      tags: [Auth, WebAuthn]
      security: []
      parameters:
        - name: session_token
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Credential из navigator.credentials.get()
      responses:
        "200":
          description: Успешный логин
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /api/v1/auth/webauthn/register/begin:
    post:
      summary: Начать регистрацию passkey
      tags: [Auth, WebAuthn]
      responses:
        "200":
          description: Опции для navigator.credentials.create()

  /api/v1/auth/webauthn/register/finish:
    post:
      summary: Завершить регистрацию passkey
      tags: [Auth, WebAuthn]
      parameters:
        - name: name
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Passkey зарегистрирован

  /api/v1/auth/webauthn/credentials:
    get:
      summary: Список passkey-ключей
      tags: [Auth, WebAuthn]
      responses:
        "200":
          description: Список
          content:
            application/json:
              schema:
                type: object
                properties:
                  credentials:
                    type: array
                    items:
                      type: object
                      properties:
                        credential_id:
                          type: string
                        name:
                          type: string
                        attestation_type:
                          type: string
                        created_at:
                          type: string
                        last_used_at:
                          type: string

  /api/v1/auth/webauthn/credentials/{credentialId}:
    delete:
      summary: Удалить passkey
      tags: [Auth, WebAuthn]
      parameters:
        - $ref: "#/components/parameters/CredentialId"
      responses:
        "200":
          description: Удалён

  # ════════════════════════════════════════════════════════════════════════════
  # Profiles
  # ════════════════════════════════════════════════════════════════════════════
  /api/v1/profiles:
    get:
      summary: Список профилей
      tags: [Profiles]
      security: []
      parameters:
        - name: id
          in: query
          schema:
            type: string
        - name: username
          in: query
          schema:
            type: string
        - name: domain
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Список
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIResponse_UserArray"

  /api/v1/profiles/{id}:
    get:
      summary: Профиль пользователя
      tags: [Profiles]
      security: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Профиль
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIResponse_User"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: Обновить профиль
      tags: [Profiles]
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                bio:
                  type: string
                avatar_url:
                  type: string
                is_anonymous:
                  type: boolean
      responses:
        "200":
          description: Профиль обновлён
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIResponse_User"

  # ════════════════════════════════════════════════════════════════════════════
  # Boards
  # ════════════════════════════════════════════════════════════════════════════
  /api/v1/boards:
    get:
      summary: Список досок
      tags: [Boards]
      security: []
      parameters:
        - name: slug
          in: query
          schema:
            type: string
        - name: is_gomosub
          in: query
          schema:
            type: boolean
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Список
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIResponse_BoardArray"
    post:
      summary: Создать доску
      tags: [Boards]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                slug:
                  type: string
                description:
                  type: string
                is_gomosub:
                  type: boolean
                is_rules_board:
                  type: boolean
                gomosub_avatar_url:
                  type: string
                cover_image_url:
                  type: string
      responses:
        "201":
          description: Создана
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIResponse_Board"

  /api/v1/boards/{slug}:
    get:
      summary: Доска по slug
      tags: [Boards]
      security: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Доска
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIResponse_Board"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/boards/{id}:
    put:
      summary: Обновить доску
      tags: [Boards]
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BoardUpdate"
      responses:
        "200":
          description: Обновлена

  # ════════════════════════════════════════════════════════════════════════════
  # Threads
  # ════════════════════════════════════════════════════════════════════════════
  /api/v1/threads:
    get:
      summary: Список тредов
      tags: [Threads]
      security: []
      parameters:
        - name: board_id
          in: query
          schema:
            type: string
        - name: id
          in: query
          schema:
            type: string
        - name: user_id
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Список тредов
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIResponse_ThreadWithBoardsArray"
    put:
      summary: Обновить тред
      tags: [Threads]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ThreadUpdate"
      responses:
        "200":
          description: Обновлён
    delete:
      summary: Удалить тред
      tags: [Threads]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
      responses:
        "200":
          description: Удалён

  /api/v1/threads/{id}:
    get:
      summary: Тред по ID
      tags: [Threads]
      security: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Тред
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIResponse_ThreadWithBoards"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: Обновить тред по ID
      tags: [Threads]
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ThreadUpdate"
      responses:
        "200":
          description: Обновлён

  # ── Likes ──────────────────────────────────────────────────────────────────
  /api/v1/threads/{id}/like:
    post:
      summary: Лайкнуть тред
      tags: [Threads, Likes]
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Лайкнут
    delete:
      summary: Убрать лайк с треда
      tags: [Threads, Likes]
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Лайк убран

  /api/v1/threads/{id}/likes:
    get:
      summary: Список лайков треда
      tags: [Threads, Likes]
      parameters:
        - $ref: "#/components/parameters/Id"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Список лайков
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIResponse_ThreadLikeArray"

  # ════════════════════════════════════════════════════════════════════════════
  # Posts
  # ════════════════════════════════════════════════════════════════════════════
  /api/v1/posts:
    get:
      summary: Список постов
      tags: [Posts]
      security: []
      parameters:
        - name: thread_id
          in: query
          schema:
            type: string
        - name: user_id
          in: query
          schema:
            type: string
        - name: id
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Список
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIResponse_PostArray"
    put:
      summary: Обновить пост
      tags: [Posts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostUpdate"
      responses:
        "200":
          description: Обновлён
    delete:
      summary: Удалить пост
      tags: [Posts]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
      responses:
        "200":
          description: Удалён

  /api/v1/posts/{id}:
    get:
      summary: Пост по ID
      tags: [Posts]
      security: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Пост
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIResponse_Post"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: Обновить пост по ID
      tags: [Posts]
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostUpdate"
      responses:
        "200":
          description: Обновлён
    delete:
      summary: Удалить пост по ID
      tags: [Posts]
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Удалён

  # ── Post Likes ─────────────────────────────────────────────────────────────
  /api/v1/posts/{id}/like:
    post:
      summary: Лайкнуть пост
      tags: [Posts, Likes]
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Лайкнут
    delete:
      summary: Убрать лайк с поста
      tags: [Posts, Likes]
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Лайк убран

  # ════════════════════════════════════════════════════════════════════════════
  # Notifications
  # ════════════════════════════════════════════════════════════════════════════
  /api/v1/notifications:
    get:
      summary: Уведомления
      tags: [Notifications]
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Список уведомлений
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIResponse_NotificationArray"

  /api/v1/notifications/{id}/read:
    put:
      summary: Отметить прочитанным
      tags: [Notifications]
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Отмечено

  /api/v1/notifications/read-all:
    put:
      summary: Отметить все прочитанными
      tags: [Notifications]
      responses:
        "200":
          description: Отмечены

  /api/v1/notifications/unread-count:
    get:
      summary: Количество непрочитанных
      tags: [Notifications]
      responses:
        "200":
          description: Счётчик
          content:
            application/json:
              schema:
                type: object
                properties:
                  unread_count:
                    type: integer

  # ════════════════════════════════════════════════════════════════════════════
  # Messenger
  # ════════════════════════════════════════════════════════════════════════════
  /api/v1/messenger/unread-count:
    get:
      summary: Непрочитанные сообщения (общий счётчик)
      tags: [Messenger]
      responses:
        "200":
          description: Счётчик
          content:
            application/json:
              schema:
                type: object
                properties:
                  unread_count:
                    type: integer

  /api/v1/messenger/conversations:
    get:
      summary: Список диалогов
      tags: [Messenger]
      responses:
        "200":
          description: Список
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConversationResponse"
    post:
      summary: Создать или получить диалог
      tags: [Messenger]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [other_user_id]
              properties:
                other_user_id:
                  type: string
      responses:
        "200":
          description: Диалог
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationResponse"

  /api/v1/messenger/conversations/{id}/messages:
    get:
      summary: Сообщения диалога
      tags: [Messenger]
      parameters:
        - $ref: "#/components/parameters/Id"
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: before
          in: query
          schema:
            type: string
            description: Курсор (message ID) для пагинации назад
      responses:
        "200":
          description: Сообщения
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MessageResponse"
    post:
      summary: Отправить сообщение
      tags: [Messenger]
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "201":
          description: Отправлено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/messenger/conversations/{id}/messages/{msgId}:
    put:
      summary: Редактировать сообщение
      tags: [Messenger]
      parameters:
        - $ref: "#/components/parameters/Id"
        - name: msgId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  maxLength: 4000
      responses:
        "200":
