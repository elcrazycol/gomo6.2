# =============================================================================
# Gomo6 — Production Docker Deployment
# =============================================================================
# Usage:
#   1. Set DOMAIN in .env (or export DOMAIN=example.com)
#   2. docker compose up -d
#
# For local dev without a domain, Caddy will serve on http://localhost
# =============================================================================

services:
  # ── Database ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: gomo6
      POSTGRES_USER: gomo6
      POSTGRES_PASSWORD: gomo6password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/backend-go/migrations:/docker-entrypoint-initdb.d
      - ./scripts/init-mcaptcha-db.sh:/docker-entrypoint-initdb.d/init-mcaptcha-db.sh
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gomo6 -d gomo6"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Cache ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Object Storage (Garage S3) ────────────────────────────────────────────
  garage:
    image: dxflrs/garage:v1.3.1
    ports:
      - "3900:3900"
    volumes:
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
      - ./apps/backend-go/garage.toml:/etc/garage.toml:ro
    command: ["/garage", "-c", "/etc/garage.toml", "server"]
    restart: unless-stopped

  garage-init:
    image: alpine:3.23
    depends_on:
      garage:
        condition: service_started
    network_mode: service:garage
    pid: service:garage
    environment:
      GARAGE_ADMIN_TOKEN: garage-admin-token
    restart: "no"
    volumes:
      - garage_keys:/garage-keys
    entrypoint:
      - /bin/sh
      - -eu
      - -c
      - |
        G="chroot /proc/1/root /garage -c /etc/garage.toml"

        # Ждём Garage RPC
        for i in $$(seq 1 180); do
          if $$G node id -q >/dev/null 2>&1; then break; fi
          echo "Waiting for Garage RPC... ($$i/180)"
          sleep 2
        done
        $$G node id -q >/dev/null 2>&1 || { echo "Garage RPC not ready"; exit 1; }

        # Layout: проверяем, не настроен ли уже
        NODE_ID=$$($$G node id -q | cut -c1-16)
        if ! $$G layout show 2>/dev/null | grep -q 'local'; then
          echo "Configuring Garage layout..."
          $$G layout assign "$$NODE_ID" -z local -c 1G
          $$G layout apply --version 1
        else
          echo "Layout already configured."
        fi

        mkdir -p /garage-keys

        # S3 Key: создаётся один раз при первом запуске. Если s3.env уже есть —
        # ключ существует и credentials сохранены, ничего не делаем.
        # Никакого recovery через key info — это хрупко и было причиной Invalid signature.
        if [ ! -f /garage-keys/s3.env ]; then
          echo "Creating S3 key gomo6-s3..."
          KEY_OUT=$$($$G key create gomo6-s3 2>&1)
          echo "$$KEY_OUT"
          ACCESS_KEY=$$(echo "$$KEY_OUT" | awk '/Key ID:/ {print $$3}')
          SECRET_KEY=$$(echo "$$KEY_OUT" | awk '/Secret key:/ {print $$3}')
          if [ -z "$$ACCESS_KEY" ] || [ -z "$$SECRET_KEY" ]; then
            echo "ERROR: failed to parse key credentials"
            exit 1
          fi
          echo "export GARAGE_S3_ACCESS_KEY='$$ACCESS_KEY'" > /garage-keys/s3.env
          echo "export GARAGE_S3_SECRET_KEY='$$SECRET_KEY'" >> /garage-keys/s3.env
          echo "Credentials written to /garage-keys/s3.env"
        fi

        # Buckets: создаём если нет, всегда grant owner.
        # ВАЖНО: bucket allow запускается при каждом старте, чтобы новые бакеты
        # добавленные в список ниже получали права без down -v.
        for bucket in content post-images avatars uploads emojis; do
          if $$G bucket info "$$bucket" >/dev/null 2>&1; then
            echo "Bucket $$bucket already exists."
          else
            echo "Creating bucket: $$bucket"
            $$G bucket create "$$bucket" 2>&1 || {
              echo "ERROR: failed to create bucket $$bucket"
              continue
            }
          fi
          if $$G bucket allow "$$bucket" --key gomo6-s3 --read --write --owner 2>&1; then
            echo "  => read+write+owner granted for $$bucket"
          else
            echo "ERROR: bucket allow failed for $$bucket"
          fi
        done

        echo "Garage initialized."

  # ── mCaptcha (Proof-of-Work CAPTCHA server, privacy-first) ───────────────
  # Setup: after first deploy, open https://mcaptcha.${DOMAIN} in browser,
  # create admin account, then create a "Site" to get site_key + secret.
  # Set MCAPTCHA_SITE_KEY, MCAPTCHA_SECRET, MCAPTCHA_VERIFY_URL in backend env.
  # Until configured, the built-in PoW CAPTCHA is used as fallback.
  mcaptcha:
    image: mcaptcha/mcaptcha:latest
    environment:
      DATABASE_URL: postgres://gomo6:gomo6password@postgres:5432/mcaptcha?sslmode=disable
      MCAPTCHA_SERVER_IP: "0.0.0.0"
      MCAPTCHA_SERVER_PORT: "8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy

  # ── Backend (Go API) ──────────────────────────────────────────────────────
  backend:
    image: ghcr.io/scramble22/gomo6-backend:latest
    build:
      context: ./apps/backend-go
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - garage_keys:/garage-keys:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    environment:
      DATABASE_URL: postgres://gomo6:gomo6password@postgres:5432/gomo6?sslmode=disable
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-auto-generated-each-restart}
      SERVER_DOMAIN: ${DOMAIN:-localhost}
      FEDERATION_KEY: ${FEDERATION_KEY:-your-federation-key-change-in-production}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://${DOMAIN:-localhost},http://localhost,http://localhost:5173,http://localhost:8081,http://docs.${DOMAIN:-localhost},http://dev.${DOMAIN:-localhost},https://docs.${DOMAIN:-localhost},https://dev.${DOMAIN:-localhost}}
      # WebAuthn / Passkeys
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID:-${DOMAIN:-localhost}}
      WEBAUTHN_RP_ORIGIN: ${WEBAUTHN_RP_ORIGIN:-https://${DOMAIN:-localhost}}
      WEBAUTHN_RP_NAME: ${WEBAUTHN_RP_NAME:-gomo6}
      ISSUER_URL: https://${DOMAIN:-localhost}
      FRONTEND_URL: https://${DOMAIN:-localhost}
      DEV_DASHBOARD_URL: https://dev.${DOMAIN:-localhost}
      # Garage S3 — credentials from /garage-keys/s3.env (written by garage-init)
      GARAGE_S3_ENDPOINT: http://garage:3900
      GARAGE_S3_REGION: garage
      GARAGE_S3_USE_SSL: false
      # mCaptcha (optional — if not set, built-in PoW CAPTCHA is used)
      MCAPTCHA_SITE_KEY: ${MCAPTCHA_SITE_KEY:-}
      MCAPTCHA_SECRET: ${MCAPTCHA_SECRET:-}
      MCAPTCHA_VERIFY_URL: ${MCAPTCHA_VERIFY_URL:-http://mcaptcha:8080/api/v1/pow/verify}
      MCAPTCHA_POW_DIFFICULTY: ${MCAPTCHA_POW_DIFFICULTY:-20}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend: Main Web App ────────────────────────────────────────────────
  web:
    image: ghcr.io/scramble22/gomo6-web:latest
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_GIT_COMMIT: ${GIT_COMMIT:-unknown}
    restart: unless-stopped

  # ── Frontend: Documentation ───────────────────────────────────────────────
  docs:
    image: ghcr.io/scramble22/gomo6-docs:latest
    build:
      context: .
      dockerfile: apps/docs/Dockerfile
    restart: unless-stopped

  # ── Frontend: Dev Dashboard ───────────────────────────────────────────────
  dev-dashboard:
    image: ghcr.io/scramble22/gomo6-dev-dashboard:latest
    build:
      context: .
      dockerfile: apps/dev-dashboard/Dockerfile
    restart: unless-stopped

  # ── Caddy Reverse Proxy (TLS + routing + S3 CORS proxy) ─────────────────
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
      web:
        condition: service_healthy
      docs:
        condition: service_healthy
      dev-dashboard:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  garage_meta:
  garage_data:
  garage_keys:
  caddy_data:
  caddy_config:
