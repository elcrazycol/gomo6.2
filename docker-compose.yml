# =============================================================================
# Gomo6 — Production Docker Deployment
# =============================================================================
# Usage:
#   1. Set DOMAIN in .env (or export DOMAIN=example.com)
#   2. docker compose up -d
#
# For local dev without a domain, Caddy will serve on http://localhost
# =============================================================================

services:
  # ── Database ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: gomo6
      POSTGRES_USER: gomo6
      POSTGRES_PASSWORD: gomo6password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/backend-go/migrations:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gomo6 -d gomo6"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Cache ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Object Storage (Garage S3) ────────────────────────────────────────────
  garage:
    image: dxflrs/garage:v1.3.1
    ports:
      - "3900:3900"
    volumes:
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
      - ./apps/backend-go/garage.toml:/etc/garage.toml:ro
    command: ["/garage", "-c", "/etc/garage.toml", "server"]
    restart: unless-stopped

  garage-init:
    image: alpine:3.23
    depends_on:
      garage:
        condition: service_started
    network_mode: service:garage
    pid: service:garage
    environment:
      GARAGE_ADMIN_TOKEN: garage-admin-token
    restart: "no"
    entrypoint:
      - /bin/sh
      - -eu
      - -c
      - |
        G="chroot /proc/1/root /garage -c /etc/garage.toml"

        # Ждём Garage RPC
        for i in $$(seq 1 180); do
          if $$G node id -q >/dev/null 2>&1; then break; fi
          echo "Waiting for Garage RPC... ($$i/180)"
          sleep 2
        done
        $$G node id -q >/dev/null 2>&1 || { echo "Garage RPC not ready"; exit 1; }

        # Layout: проверяем, не настроен ли уже
        NODE_ID=$$($$G node id -q | cut -c1-16)
        if ! $$G layout show 2>/dev/null | grep -q 'local'; then
          echo "Configuring Garage layout..."
          $$G layout assign "$$NODE_ID" -z local -c 1G
          $$G layout apply --version 1
        else
          echo "Layout already configured."
        fi

        # S3 Key: всегда импортим (force overwrite), чтобы при перезапуске
        # с новыми credentials или volume'ами ключ был актуален.
        echo "Importing S3 key..."
        $$G key import --yes -n gomo6-s3 \
          GK3515373e4c851ebaad366558 \
          7d37d093435a41f2aab8f13c19ba067d9776c90215f56614adad6ece597dbb34 2>&1 || echo "WARN: key import failed (may already exist with same ID)"

        # Buckets: создаём если нет, всегда даём owner (на случай смены ключа)
        for bucket in content post-images avatars uploads; do
          if ! $$G bucket info "$$bucket" 2>&1 | grep -q "$$bucket"; then
            echo "Creating bucket: $$bucket"
            $$G bucket create "$$bucket" 2>&1 || true
          else
            echo "Bucket $$bucket already exists."
          fi
          echo "Granting owner access to bucket: $$bucket"
          $$G bucket allow "$$bucket" --key gomo6-s3 --owner 2>&1 || echo "WARN: bucket allow failed for $$bucket"
        done

        echo "Garage initialized."

  # ── Backend (Go API) ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./apps/backend-go
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://gomo6:gomo6password@postgres:5432/gomo6?sslmode=disable
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-auto-generated-each-restart}
      SERVER_DOMAIN: ${DOMAIN:-localhost}
      FEDERATION_KEY: ${FEDERATION_KEY:-your-federation-key-change-in-production}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://${DOMAIN:-localhost},http://localhost,http://docs.${DOMAIN:-localhost},http://dev.${DOMAIN:-localhost},https://docs.${DOMAIN:-localhost},https://dev.${DOMAIN:-localhost}}
      ISSUER_URL: http://${DOMAIN:-localhost}
      FRONTEND_URL: http://${DOMAIN:-localhost}
      DEV_DASHBOARD_URL: http://dev.${DOMAIN:-localhost}
      # Garage S3 — backend общается с Garage напрямую (браузер через backend)
      GARAGE_S3_ENDPOINT: http://garage:3900
      GARAGE_S3_REGION: garage
      GARAGE_S3_ACCESS_KEY: GK3515373e4c851ebaad366558
      GARAGE_S3_SECRET_KEY: 7d37d093435a41f2aab8f13c19ba067d9776c90215f56614adad6ece597dbb34
      GARAGE_S3_USE_SSL: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      garage-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Frontend: Main Web App ────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped

  # ── Frontend: Documentation ───────────────────────────────────────────────
  docs:
    build:
      context: .
      dockerfile: apps/docs/Dockerfile
    restart: unless-stopped

  # ── Frontend: Dev Dashboard ───────────────────────────────────────────────
  dev-dashboard:
    build:
      context: .
      dockerfile: apps/dev-dashboard/Dockerfile
    restart: unless-stopped

  # ── Caddy Reverse Proxy (TLS + routing + S3 CORS proxy) ─────────────────
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_started
      web:
        condition: service_healthy
      docs:
        condition: service_healthy
      dev-dashboard:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  garage_meta:
  garage_data:
  caddy_data:
  caddy_config:
